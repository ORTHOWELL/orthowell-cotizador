<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualizando ORTHOWELL...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    background: #f5f5f0; gap: 20px; padding: 24px; text-align: center;
  }
  .logo { font-size: 36px; font-weight: 800; color: #e07736; letter-spacing: -1px; }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #f0ddd0; border-top-color: #e07736;
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg  { font-size: 17px; font-weight: 700; color: #222; }
  .sub  { font-size: 13px; color: #888; max-width: 300px; }
  .done { font-size: 32px; }
</style>
</head>
<body>
<div class="logo">ORTHOWELL</div>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Actualizando la app...</div>
<div class="sub" id="sub">Borrando caché — no cierres esta ventana</div>
<script>
(async () => {
  const msg = document.getElementById('msg');
  const sub = document.getElementById('sub');
  const spinner = document.getElementById('spinner');
  try {
    sub.textContent = 'Borrando caché de imágenes y recursos...';
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));

    sub.textContent = 'Desregistrando Service Worker antiguo...';
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));

    spinner.style.display = 'none';
    document.body.insertAdjacentHTML('afterbegin', '<div class="done">✅</div>');
    msg.textContent = '¡Listo! Redirigiendo a la app...';
    sub.textContent = 'La próxima carga traerá la versión más reciente.';
  } catch(e) {
    msg.textContent = 'Redirigiendo...';
    sub.textContent = '';
  }
  setTimeout(() => { window.location.replace('./'); }, 1200);
})();
</script>
</body>
</html>
