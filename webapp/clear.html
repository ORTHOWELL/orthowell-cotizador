<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualizando ORTHOWELL...</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0;
    background: #f5f5f5; color: #333; text-align: center; padding: 20px;
  }
  .logo { font-size: 48px; margin-bottom: 16px; }
  h2 { margin: 0 0 8px; font-size: 20px; color: #1a237e; }
  p { margin: 0 0 24px; color: #666; font-size: 14px; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid #e0e0e0;
    border-top-color: #1a237e; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step { font-size: 13px; color: #888; min-height: 20px; }
  .done { color: #2e7d32; font-weight: 600; font-size: 15px; }
</style>
</head>
<body>
<div class="logo">🔄</div>
<h2>Actualizando ORTHOWELL</h2>
<p>Por favor espera, esto solo toma unos segundos...</p>
<div class="spinner" id="spinner"></div>
<div class="step" id="step">Limpiando caché...</div>

<script>
async function clearAndRedirect() {
  const step = document.getElementById('step');

  try {
    step.textContent = 'Eliminando caché del navegador...';
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }

    step.textContent = 'Desregistrando Service Worker...';
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }

    step.textContent = '¡Listo! Abriendo la app actualizada...';
    document.getElementById('spinner').style.borderTopColor = '#2e7d32';

    // Pequeña pausa para que el usuario vea el mensaje
    await new Promise(r => setTimeout(r, 800));

    // Redirigir a la app con cache-buster para evitar cualquier caché del navegador
    const base = location.origin + location.pathname.replace('clear.html', '');
    window.location.replace(base + '?_=' + Date.now());

  } catch(err) {
    step.textContent = 'Error: ' + err.message + ' — redirigiendo igual...';
    await new Promise(r => setTimeout(r, 1500));
    const base = location.origin + location.pathname.replace('clear.html', '');
    window.location.replace(base + '?_=' + Date.now());
  }
}

// Esperar a que el SW actual no intercepte la redirección
clearAndRedirect();
</script>
</body>
</html>
